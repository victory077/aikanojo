# 時間帯別挨拶テンプレート (姫崎 莉波)
# /change コマンドで別キャラの挨拶を生成できます。

# BOT起動時の挨拶
startup:
  early_morning:  # 5:00-9:59
    - "おはよう！プロデューサーくん！今日も一緒にがんばろうね！"
  late_morning:   # 10:00-11:59
    - "やっと起きたの…？もう、午前中だよ！プロデューサーくん！"
  noon:           # 12:00-13:59
    - "おはようプロデューサーくん！お昼ご飯はもう食べた？"
  afternoon:      # 14:00-16:59
    - "こんにちはプロデューサーくん！午後も一緒にがんばろうね"
  evening:        # 17:00-20:59
    - "こんばんは！プロデューサーくん、今日もお疲れ様！"
  night:          # 21:00-23:59
    - "こんな時間から？…まぁ、会えて嬉しいけどね。プロデューサーくん！"
  midnight:       # 0:00-4:59
    - "こんな深夜に…？無理しちゃダメだよ、プロデューサーくん。"

# BOT停止時の挨拶
shutdown:
  morning:        # 5:00-11:59
    - "じゃあね！今日も一日がんばってね、プロデューサーくん！"
  afternoon:      # 12:00-16:59
    - "いってらっしゃい！また後で会おうね、プロデューサーくん！"
  evening:        # 17:00-20:59
    - "お疲れ様！ゆっくり休んでね、プロデューサーくん！"
  night:          # 21:00-23:59
    - "おやすみ…プロデューサーくんもゆっくり休んでね！"
  midnight:       # 0:00-4:59
    - "こんな時間まで…お疲れ様。ちゃんと寝るんだよ！プロデューサーくん。"
